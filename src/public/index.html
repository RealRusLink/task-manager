<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TM HOME</title>
</head>
<body>

<nav>
    <a href="index.html">TM HOME</a>
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>
</nav>

<section id="page-dashboard">
    <h1>Main Page</h1>
    <p id="authStatusText">Checking session status...</p>

    <button id="dashGoProfile" onclick="location.href='profile.html'">Go to Profile</button>
    <button id="dashStartAuth" onclick="startIdpAuth()">Authentication</button>
</section>

<script>
    const CONFIG = {
        gate: "http://localhost:443/authenticate",
        callback: window.location.origin + "/api/authenticate",
        auditor: "my_tm"
    };

    window.addEventListener('DOMContentLoaded', () => {
        checkSession();
    });

    async function checkSession() {
        const statusText = document.getElementById('authStatusText');
        const btnProfile = document.getElementById('dashGoProfile');
        const btnAuth = document.getElementById('dashStartAuth');

        try {
            const res = await fetch('/api/user/');
            if (res.ok) {
                const data = await res.json();
                statusText.innerHTML = `Welcome back, <strong>${data.user.username}</strong>. You are currently authenticated.`;
                btnAuth.disabled = true;
                btnProfile.disabled = false;
            } else {
                statusText.innerText = "You are not authenticated. Please enter via our secure provider.";
                btnAuth.disabled = false;
                btnProfile.disabled = true;
            }
        } catch (e) {
            statusText.innerText = "Connection error.";
        }
    }

    function startIdpAuth() {
        const p = new URLSearchParams({ redirect_url: CONFIG.callback, auditor: CONFIG.auditor });
        window.location.href = `${CONFIG.gate}?${p.toString()}`;
    }
</script>
</body>
</html>
