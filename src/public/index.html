<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dashboard</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            background: #eef2ff;
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        .status-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #111827;
            letter-spacing: -0.025em;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-auth {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        .btn-auth:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-profile {
            background-color: #f9fafb;
            color: var(--text-main);
            border: 1px solid #e5e7eb;
        }

        .btn-profile:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="status-tag">Development Hub</div>
        <h1>Task Manager</h1>
        <p>Access the core resource server using our secure Central Identity Provider.</p>

        <div class="controls">
            <button id="authTrigger" class="btn btn-auth">
                Authenticate via IDP
            </button>

            <a href="/profile.html" class="btn btn-profile">
                Go to Profile
            </a>
        </div>

        <div class="footer-note">
            Resource Server v1.0.4-dev
        </div>
    </div>
</div>

<script>
    const AUTH_PARAMS = {
        gate: "http://localhost:443/authenticate",
        callback: window.location.origin + "/api/authenticate",
        auditor: "my_tm"
    };

    const authBtn = document.getElementById('authTrigger');

    authBtn.addEventListener('click', () => {
        const searchParams = new URLSearchParams({
            redirect_url: AUTH_PARAMS.callback,
            auditor: AUTH_PARAMS.auditor
        });

        const finalUrl = `${AUTH_PARAMS.gate}?${searchParams.toString()}`;
        window.location.href = finalUrl;
    });
</script>
</body>
</html>
