<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Management</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        .hidden { display: none !important; }

        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-logo { color: white; font-weight: 800; font-size: 1.2rem; text-decoration: none; }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .profile-wrapper {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .profile-wrapper { grid-template-columns: 1fr; align-items: center; }
        }

        .glass-card {
            background: var(--glass);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
        }

        .user-header { text-align: center; }
        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem;
        }

        .username-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100px;
        }

        .username-text, .username-input {
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0;
            padding: 0;
            font-family: inherit;
            color: var(--text-main);
            text-align: center;
        }

        .username-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--primary);
            outline: none;
            width: auto;
        }

        .edit-controls {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .data-list { margin-top: auto; text-align: left; padding-top: 2rem; }
        .data-item {
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #f3f4f6;
        }
        .data-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .data-value { display: block; font-weight: 500; margin-top: 2px; }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 0.8rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid #e5e7eb; color: var(--text-muted); background: transparent; width: 100%; margin-top: 10px; }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid transparent; }
        .btn-ghost:hover { border-color: #e5e7eb; }
        .btn-danger-link { background: transparent; color: var(--error); font-size: 0.8rem; margin-top: 1rem; cursor: pointer; border: none; font-weight: 600; }

        .identity-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 5px;
        }
        .idp-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #f3f4f6;
        }
        .idp-icon { width: 32px; height: 32px; background: #eef2ff; color: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; }

        .reauth-banner {
            position: fixed;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 1rem 2rem;
            border-radius: 12px; display: flex; align-items: center; gap: 1.5rem; z-index: 100;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 3rem; border-radius: 24px; text-align: center; max-width: 500px; width: 90%;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-logo">HOME</a>
</nav>

<div id="reauthBanner" class="reauth-banner hidden">
    <span>Session expired. Please re-authenticate.</span>
    <button onclick="startIdpAuth(true)" class="btn btn-primary">Login</button>
</div>

<div id="deleteModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 style="color:var(--error); font-weight:900;">TERMINATE ACCOUNT</h2>
        <p>This action is irreversible. All data will be wiped.</p>
        <button id="confirmDeleteBtn" onclick="executeDeletion()" class="btn btn-primary" style="background:var(--error); width:100%; margin-top:1rem;" disabled>
            Wait <span id="timer">10</span>s
        </button>
        <button onclick="closeDeleteModal()" class="btn btn-outline">Cancel</button>
    </div>
</div>

<div class="container">
    <div class="profile-wrapper">

        <div class="glass-card user-header">
            <div class="avatar-circle" id="avatarLetter">?</div>

            <div class="username-row">
                <div id="nameView">
                    <h1 id="userNameDisplay" class="username-text">Loading...</h1>
                    <button onclick="toggleEdit(true)" class="btn btn-ghost" style="margin-top: 8px;">Edit Username</button>
                </div>

                <div id="nameEdit" class="hidden">
                    <input type="text" id="usernameInput" class="username-input">
                    <div id="usernameError" style="color: var(--error); font-size: 0.7rem; margin-top: 4px; height: 14px;"></div>
                    <div class="edit-controls">
                        <button id="saveBtn" onclick="submitUsername()" class="btn btn-primary">OK</button>
                        <button onclick="toggleEdit(false)" class="btn btn-ghost">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="data-list">
                <div class="data-item">
                    <span class="data-label">Registration Date</span>
                    <span id="userCreated" class="data-value">-</span>
                </div>
            </div>

            <button onclick="handleLogout()" class="btn btn-outline">Sign Out</button>
            <button onclick="openDeleteModal()" class="btn btn-danger-link">Delete Account</button>
        </div>

        <div class="glass-card">
            <h3 style="margin-top: 0; font-size: 1rem; letter-spacing: -0.5px; text-transform: uppercase; color: var(--text-muted);">Linked Identities</h3>
            <div id="identitiesList" class="identity-grid"></div>
        </div>

    </div>
</div>

<script>
    const AUTH_CONFIG = {
        gate: "http://localhost:443/authenticate",
        callback: window.location.origin + "/api/authenticate",
        auditor: "my_tm"
    };

    let CURRENT_USERNAME = "";
    let deleteInterval;

    function toggleEdit(show) {
        document.getElementById('nameView').classList.toggle('hidden', show);
        document.getElementById('nameEdit').classList.toggle('hidden', !show);
        if (show) {
            const input = document.getElementById('usernameInput');
            input.value = CURRENT_USERNAME;
            input.style.width = (CURRENT_USERNAME.length + 1) + "ch";
            input.focus();
            document.getElementById('usernameError').innerText = "";
        }
    }

    async function submitUsername() {
        const val = document.getElementById('usernameInput').value.trim();
        if (val === CURRENT_USERNAME) return toggleEdit(false);

        try {
            const res = await fetch('/api/user/protected/username', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: val })
            });

            if (res.status === 403) return document.getElementById('reauthBanner').classList.remove('hidden');
            if (res.ok) { await fetchProfile(); toggleEdit(false); }
            else { document.getElementById('usernameError').innerText = await res.text(); }
        } catch (e) { document.getElementById('usernameError').innerText = "Error"; }
    }

    function openDeleteModal() {
        document.getElementById('deleteModal').classList.remove('hidden');
        let sec = 10;
        const btn = document.getElementById('confirmDeleteBtn');
        btn.disabled = true;
        deleteInterval = setInterval(() => {
            sec--;
            document.getElementById('timer').innerText = sec;
            if (sec <= 0) { clearInterval(deleteInterval); btn.disabled = false; btn.innerText = "CONFIRM DELETION"; }
        }, 1000);
    }

    function closeDeleteModal() { document.getElementById('deleteModal').classList.add('hidden'); clearInterval(deleteInterval); }

    async function executeDeletion() {
        const res = await fetch('/api/user/protected/delete', { method: 'POST' });
        if (res.status === 403) { closeDeleteModal(); document.getElementById('reauthBanner').classList.remove('hidden'); }
        else if (res.ok) window.location.href = "/";
    }

    async function fetchProfile() {
        const res = await fetch('/api/user');
        if (res.ok) {
            const data = await res.json();
            CURRENT_USERNAME = data.user.username;
            document.getElementById('userNameDisplay').innerText = CURRENT_USERNAME;
            document.getElementById('avatarLetter').innerText = CURRENT_USERNAME[0].toUpperCase();
            document.getElementById('userCreated').innerText = new Date(data.user.created).toLocaleDateString();

            document.getElementById('identitiesList').innerHTML = data.identities.map(i => `
                <div class="idp-card">
                    <div class="idp-icon">${i.idp[0].toUpperCase()}</div>
                    <div>
                        <div style="font-weight:700; font-size:0.85rem;">${i.idp.toUpperCase()}</div>
                        <div style="color:var(--text-muted); font-size:0.75rem;">${i.username}</div>
                    </div>
                </div>
            `).join('');
        } else { window.location.href = "/"; }
    }

    function startIdpAuth(force = false) {
        const p = new URLSearchParams({ redirect_url: AUTH_CONFIG.callback, auditor: AUTH_CONFIG.auditor });
        if (force) p.append('prompt', 'login');
        window.location.href = `${AUTH_CONFIG.gate}?${p.toString()}`;
    }

    function handleLogout() {
        window.location.href = `/api/user/logout?redirect_url=${encodeURIComponent(window.location.origin)}`;
    }

    document.getElementById('usernameInput').addEventListener('input', function() {
        this.style.width = (this.value.length + 1) + "ch";
    });

    fetchProfile();
</script>
</body>
</html>
